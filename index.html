<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Explorers - ระบบการเรียนรู้ภูมิศาสตร์</title>
    <!-- Favicon รูปเข็มทิศโลก -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel & Custom Preset for Classic JSX Runtime -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        // บังคับให้ Babel แปลง JSX ด้วยรูปแบบ Classic (React.createElement) ป้องกัน Error เรื่อง import
        Babel.registerPreset('react-classic', {
            presets: [
                Babel.availablePresets['env'],
                [Babel.availablePresets['react'], { "runtime": "classic" }]
            ]
        });
    </script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-base: #064e3b; /* เขียวป่าฝนลึก */
            --text-base: #f5f5f4;
            --glass-bg: rgba(28, 25, 23, 0.85);
            --glass-border: rgba(212, 175, 55, 0.2);
            --panel-hover: rgba(41, 37, 36, 0.95);
            --input-bg: #1c1917;
            --input-text: #ffffff;
            --table-header: #141211;
            --table-row: #1c1917;
            --table-row-alt: #262220;
            --text-dark: #f5f5f4;
        }

        .light-theme {
            --bg-base: #f4efe6; /* ทรายทะเลทรายอุ่น */
            --text-base: #1c1917;
            --glass-bg: rgba(255, 255, 255, 0.96);
            --glass-border: rgba(180, 140, 20, 0.45);
            --panel-hover: rgba(245, 242, 235, 1);
            --input-bg: #ffffff;
            --input-text: #1c1917;
            --table-header: #ebe7dd;
            --table-row: #ffffff;
            --table-row-alt: #fcfbfa;
            --text-dark: #1c1917;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--bg-base);
            color: var(--text-base);
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .font-serif { font-family: 'Merriweather', serif; }

        .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.15); border-radius: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #b48c14; border-radius: 6px; border: 2px solid transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #96730d; }

        .animate-ken-burns { animation: kenburns 30s ease-in-out infinite alternate; }
        @keyframes kenburns {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.15) translate(-1%, -1%); }
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: background 0.3s ease, border 0.3s ease;
        }
        
        .glass-panel:hover { background: var(--panel-hover); }

        /* Pet Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg); }
            75% { transform: rotate(8deg); }
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 6px rgba(212, 175, 55, 0.4)); }
            50% { filter: drop-shadow(0 0 18px rgba(212, 175, 55, 0.85)); }
        }
        
        .anim-float { animation: float 3.5s ease-in-out infinite; }
        .anim-wiggle { animation: wiggle 1.8s ease-in-out infinite; }
        .anim-glow { animation: glow 2.5s ease-in-out infinite; }
        .anim-combo { animation: float 3s ease-in-out infinite, glow 3.5s ease-in-out infinite; }

        .input-theme {
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 2px solid var(--glass-border);
            font-weight: 600;
        }
        
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px var(--input-bg) inset !important;
            -webkit-text-fill-color: var(--input-text) !important;
        }

        .light-theme .bg-layer { opacity: 0.22 !important; }

        /* Excel-like High Contrast Input Settings */
        .excel-table {
            border-collapse: separate;
            border-spacing: 0;
        }
        .excel-table th {
            border-bottom: 2px solid #b48c14;
            border-right: 1px solid rgba(180, 140, 20, 0.25);
            font-weight: 800;
            color: var(--text-dark);
        }
        .excel-table td {
            border-bottom: 1px solid rgba(180, 140, 20, 0.15);
            border-right: 1px solid rgba(180, 140, 20, 0.15);
        }

        .excel-input {
            width: 100%;
            height: 100%;
            min-width: 75px;
            padding: 10px 6px;
            text-align: center;
            font-weight: 800;
            font-size: 1.05rem;
            color: #000000 !important;
            background-color: #ffffff !important;
            border: 2px solid #b48c14;
            border-radius: 6px;
            transition: all 0.15s ease;
        }
        .excel-input:focus {
            outline: none;
            border-color: #d4af37;
            background-color: #fffae6 !important;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
            transform: scale(1.03);
        }
        
        /* Floating toolbox styles on the bottom-right */
        .floating-toolbox {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- ใช้งาน Preset พิเศษ react-classic ที่สร้างไว้ เพื่อรันโค้ดอย่างเสถียร -->
    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useMemo, useRef } = React;

        // ดึงข้อมูลเชื่อมโยงตรงกับ Apps Script ที่ครูส่งให้ล่าสุด
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylGa4xgjKRMZQn3xBniSZVp2UfgHd1hBcj4QKracbFiKuxu1uOomTOIv-MjM2vDydC/exec"; 

        const ROOMS = ['ม.5/1', 'ม.5/2', 'ม.5/3', 'ม.5/7', 'ม.5/8', 'ม.4/8'];

        const BGS = [
            "https://images.unsplash.com/photo-1518182170546-076616fdcd80?auto=format&fit=crop&w=1920&q=80",
            "https://images.unsplash.com/photo-1473448912268-2022ce9509d8?auto=format&fit=crop&w=1920&q=80",
            "https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?auto=format&fit=crop&w=1920&q=80"
        ];

        // เพลงบรรเลงสำหรับสร้างบรรยากาศผจญภัย (อัปเดตลิงก์ใหม่ที่เสถียร ไม่โดนบล็อกการสตรีมมิ่ง)
        const AUDIO_SRC = "https://assets.mixkit.co/active_storage/sfx/2514/2514-preview.mp3";

        const INITIAL_TASKS = {};
        const INITIAL_STUDENTS = [];
        const INITIAL_MATERIALS = {};
        const INITIAL_ANNOUNCEMENTS = {};

        // ระบบวิวัฒนาการของสัตว์ผู้พิทักษ์ (Geo-Tamagotchi)
        const getEvolution = (score) => {
            if (score < 5) return { stage: 'Ancient Stone Egg', emoji: '🪨', title: 'ผู้ค้นพบฝึกหัด', color: 'text-stone-500', anim: 'anim-wiggle', greeting: 'ตูม...ตูม... ไข่ศิลาโบราณยังคงเงียบสงบ' };
            if (score < 10) return { stage: 'Cracked Mystic Egg', emoji: '🥚✨', title: 'ผู้ปลุกพลังธรรมชาติ', color: 'text-amber-500', anim: 'anim-wiggle', greeting: '*เปร๊อะ!* มีรอยร้าวและแสงอุ่นเรืองรองออกมา!' };
            if (score < 20) return { stage: 'Baby Sprite', emoji: '🌱', title: 'ผู้พิทักษ์หยาดน้ำค้าง', color: 'text-green-500', anim: 'anim-float', greeting: 'สวัสดีผู้เดินทาง! มาสนุกกับภูมิศาสตร์กันเถอะ!' };
            if (score < 30) return { stage: 'Guardian Companion', emoji: '🌿🐺', title: 'สหายผู้ชี้ทางพนาลัย', color: 'text-emerald-600', anim: 'anim-float', greeting: 'ข้าพร้อมตะลุยดินแดนและภูมิภาคต่างๆ ไปกับท่านแล้ว!' };
            if (score < 40) return { stage: 'Terrane Guardian', emoji: '🌳🦅', title: 'ผู้ปกปักษ์รักษาผืนปฐพี', color: 'text-amber-600', anim: 'anim-combo', greeting: 'ปัญญาของท่านสะสมจนกลายเป็นพลังภูเขาให้แก่ข้า!' };
            return { stage: 'Legendary Earth Titan', emoji: '🌋🐉', title: 'เจ้าแห่งรอยเลื่อนเลื่อนลั่น', color: 'text-yellow-500', anim: 'anim-combo', greeting: 'ข้าคือตำนานแห่งธาตุโลก! ขอบารมีท่านช่วยพิชิตยอดเขาชัน!' };
        };

        const Icons = {
            Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Lock: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>,
            Compass: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 11l3-3m0 0l3 3m-3-3v8m0-13a9 9 0 110 18 9 9 0 010-18z" /></svg>,
            Chat: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>,
            Sun: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            Moon: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>,
            MusicOn: () => <span className="text-xl font-bold">🔊 เล่นเพลงคลาสสิก</span>,
            MusicOff: () => <span className="text-xl font-bold">🔇 ปิดเสียงเพลง</span>,
            Link: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>,
            Plus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>,
            Alert: () => <svg className="w-16 h-16 text-red-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Trophy: () => <svg className="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>,
            Download: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
            AlertTriangle: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
        };

        function App() {
            const [view, setView] = useState('home');
            const [currentBg, setCurrentBg] = useState(0);
            const [isLightMode, setIsLightMode] = useState(false);
            const [audioPlaying, setAudioPlaying] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [audioReadyMessage, setAudioReadyMessage] = useState('แตะหน้าจอเพื่อเริ่มฟังเพลงบรรเลง 🎵');
            const audioRef = useRef(null);
            
            const [students, setStudents] = useState(INITIAL_STUDENTS);
            const [tasksState, setTasksState] = useState(INITIAL_TASKS);
            const [announcements, setAnnouncements] = useState(INITIAL_ANNOUNCEMENTS);
            const [materials, setMaterials] = useState(INITIAL_MATERIALS);
            const [isSyncing, setIsSyncing] = useState(false);
            
            const [adminPassword, setAdminPassword] = useState('');
            const [selectedRoom, setSelectedRoom] = useState(ROOMS[0]);
            const [adminTab, setAdminTab] = useState('grades'); 
            const [missingViewMode, setMissingViewMode] = useState('byTask');
            const [modal, setModal] = useState({ isOpen: false, type: '', data: null }); 

            const [studentId, setStudentId] = useState('');
            const [currentStudent, setCurrentStudent] = useState(null);
            const [loading, setLoading] = useState(false);

            const [isAppReady, setIsAppReady] = useState(false);
            const [fetchError, setFetchError] = useState(null);

            const [activeColMenu, setActiveColMenu] = useState(null);

            // แก้ไขปัญหาการเล่นเสียงบนอุปกรณ์ iOS/Android/Chrome
            const handleInteractAndPlayAudio = () => {
                if (audioRef.current && !audioPlaying) {
                    audioRef.current.volume = 0.4; // ปรับลดระดับเสียงพื้นหลังลงเล็กน้อยเพื่อไม่ให้รบกวนสมาธิ
                    const playPromise = audioRef.current.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            setAudioPlaying(true);
                            setAudioReadyMessage('เพลงกำลังบรรเลง 🔊');
                        }).catch(err => {
                            console.log("Audio block policy handled:", err);
                        });
                    }
                }
            };

            // ตรวจจับการแตะครั้งแรกของผู้ใช้เพื่อสั่งเปิดเพลงตามกฎเบราว์เซอร์
            useEffect(() => {
                const handleGesture = () => {
                    handleInteractAndPlayAudio();
                    // ถอด Event ออกทันทีหลังจากผู้ใช้แตะครั้งแรกไปแล้ว เพื่อไม่ให้รบกวนการทำงานอื่น
                    window.removeEventListener('click', handleGesture);
                    window.removeEventListener('touchstart', handleGesture);
                    window.removeEventListener('keydown', handleGesture);
                };
                
                window.addEventListener('click', handleGesture);
                window.addEventListener('touchstart', handleGesture);
                window.addEventListener('keydown', handleGesture);
                
                return () => {
                    window.removeEventListener('click', handleGesture);
                    window.removeEventListener('touchstart', handleGesture);
                    window.removeEventListener('keydown', handleGesture);
                };
            }, []); // เปลี่ยนค่า Dependency ให้รันเพียงครั้งเดียวตอนโหลดแอป

            useEffect(() => {
                if(GOOGLE_SCRIPT_URL) {
                    setIsSyncing(true);
                    fetch(GOOGLE_SCRIPT_URL + "?action=getData")
                        .then(res => res.json())
                        .then(data => {
                            if(data.status === 'success') {
                                setStudents(data.students || []);
                                setTasksState(data.tasks || {});
                                setMaterials(data.materials || {});
                                setAnnouncements(data.announcements || {});
                                setIsAppReady(true);
                            } else {
                                setFetchError("ข้อมูลฝั่งหลังบ้านไม่พร้อมใช้งาน: " + data.message);
                            }
                            setIsSyncing(false);
                        })
                        .catch(err => { 
                            console.error(err); 
                            setFetchError("ล้มเหลวในการซิงค์ฐานข้อมูล (โปรดเช็ค Deployment และสิทธิ์เป็น 'Anyone')");
                            setIsSyncing(false); 
                        });
                } else {
                    setFetchError("โปรดใส่ GOOGLE_SCRIPT_URL เพื่อเริ่มงาน");
                }
            }, []);

            const saveToGoogleSheets = () => {
                if(!GOOGLE_SCRIPT_URL) return;
                setIsSyncing(true);
                
                const payload = {
                    action: 'saveAll',
                    students: students,
                    tasks: tasksState,
                    materials: materials,
                    announcements: announcements
                };
                
                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    setIsSyncing(false);
                    if(data.status === 'success') {
                        setModal({ isOpen: true, type: 'alert', data: 'บันทึกคะแนนและคำแนะนำทั้งหมดลง Google Sheets สำเร็จเรียบร้อยแล้ว!' });
                    } else {
                        setModal({ isOpen: true, type: 'alert', data: 'บันทึกไม่สำเร็จ: ' + data.message });
                    }
                })
                .catch(err => {
                    console.error(err);
                    setIsSyncing(false);
                    setModal({ isOpen: true, type: 'alert', data: 'ล้มเหลวในการอัปโหลดข้อมูล มีปัญหาด้านระบบเครือข่าย' });
                });
            };

            const exportToCSV = () => {
                const roomStudents = students.filter(s => s.room === selectedRoom).sort((a, b) => a.number - b.number);
                const currentTasks = tasksState[selectedRoom] || [];
                
                let csvContent = "\ufeff"; 
                csvContent += "เลขที่,รหัสประจำตัว,ชื่อ-นามสกุล,";
                currentTasks.forEach(task => {
                    csvContent += `${task.name} (เต็ม ${task.maxScore}),`;
                });
                csvContent += "คะแนนโบนัส,คะแนนรวม\n";

                roomStudents.forEach(student => {
                    let total = getStudentTotal(student, currentTasks);
                    csvContent += `${student.number},'${student.id},${student.name},`;
                    currentTasks.forEach(task => {
                        csvContent += `${student.scores[task.id] !== null && student.scores[task.id] !== undefined ? student.scores[task.id] : "-"},`;
                    });
                    csvContent += `${student.bonus || 0},${total}\n`;
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `รายงานคะแนน_ห้อง_${selectedRoom.replace("/", "_")}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            useEffect(() => {
                if (isLightMode) document.body.classList.add('light-theme');
                else document.body.classList.remove('light-theme');
            }, [isLightMode]);

            useEffect(() => {
                const interval = setInterval(() => {
                    setCurrentBg(prev => (prev + 1) % BGS.length);
                }, 15000);
                return () => clearInterval(interval);
            }, []);

            const toggleAudio = () => {
                if (audioRef.current) {
                    if (audioPlaying) {
                        audioRef.current.pause();
                        setAudioPlaying(false);

                    if (t.type === 'task') { maxTask += t.maxScore; taskTotal += (score || 0); }
                    if (t.type === 'midterm') { maxMid += t.maxScore; midTotal += (score || 0); }
                    if (t.type === 'final') { maxFin += t.maxScore; finTotal += (score || 0); }
                });
                
                return {
                    taskTotal, maxTask, midTotal, maxMid, finTotal, maxFin,
                    bonus: student.bonus || 0,
                    totalScore: taskTotal + midTotal + finTotal + (student.bonus || 0)
                };

                    e.preventDefault();
                    let nextRow = rowIndex;
                    let nextCol = colIndex;

                    if (e.key === 'ArrowUp') nextRow = Math.max(0, rowIndex - 1);
                    if (e.key === 'ArrowDown' || e.key === 'Enter') nextRow = Math.min(maxRows - 1, rowIndex + 1);
                    if (e.key === 'ArrowLeft') nextCol = Math.max(0, colIndex - 1);
                    if (e.key === 'ArrowRight') nextCol = Math.min(maxCols - 1, colIndex + 1);

                    const nextInput = document.querySelector(`input[data-row="${nextRow}"][data-col="${nextCol}"]`);

                                        </div>
                                        <p className="text-base md:text-xl font-bold tracking-wide max-w-md text-white drop-shadow-md">
                                            ระบบตรวจสอบผลประเมินรายวิชาและเลี้ยงผู้พิทักษ์ภูมิศาสตร์<br/>ร่วมบันทึกสถิติและพัฒนา EXP ไปด้วยกัน
                                        </p>
                                        <div className="flex flex-col sm:flex-row gap-4 w-full max-w-md">
                                            <button onClick={() => { setView('studentLogin'); }} className="flex-1 px-6 py-4 bg-stone-900/80 hover:bg-amber-500 text-amber-500 hover:text-stone-900 border border-amber-500/30 hover:border-amber-500 transition-all duration-300 font-bold tracking-wider rounded-lg shadow-lg">
                                                STUDENT PORTAL
                                            </button>
                                            <button onClick={() => { setView('adminLogin'); }} className="flex-1 px-6 py-4 bg-stone-900/80 hover:bg-stone-800 text-stone-400 hover:text-white border border-stone-700 hover:border-white transition-all duration-300 font-bold tracking-wider rounded-lg shadow-lg">
                                                TEACHER PORTAL
                                            </button>
                                        </div>
                                    </div>

                                    {/* ตารางจัดอันดับ Top 5 นักสำรวจที่มี Exp สูงสุด */}
                                    <div className="flex-1 w-full max-w-md lg:max-w-lg">
                                        <div className="glass-panel p-4 md:p-6 rounded-2xl border-t-4 border-t-amber-500 shadow-2xl relative overflow-hidden">
                                            <div className="flex items-center gap-3 mb-6">
                                                <Icons.Trophy />
                                                <h2 className="text-lg md:text-xl font-serif font-bold text-white tracking-widest uppercase">Global Leaderboard (Top 5)</h2>
                                            </div>
                                            
                                            <div className="space-y-3 md:space-y-4">
                                                {globalLeaderboard.map((student, index) => {
                                                    const pet = getEvolution(student.totalScore);
                                                    return (
                                                        <div key={student.id} className="flex items-center justify-between p-3 bg-stone-900/50 hover:bg-stone-850 border border-stone-800 rounded-xl transition-all">
                                                            <div className="flex items-center gap-3 md:gap-4 overflow-hidden">
                                                                <div className={`w-6 h-6 md:w-8 md:h-8 shrink-0 rounded-full flex items-center justify-center font-bold font-serif ${index === 0 ? 'bg-yellow-500 text-black shadow-lg' : index === 1 ? 'bg-stone-300 text-black' : index === 2 ? 'bg-amber-700 text-white' : 'bg-stone-800 text-stone-400'}`}>
                                                                    {index + 1}
                                                                </div>
                                                                <div className="overflow-hidden">
                                                                    <p className="text-white font-bold text-xs md:text-sm truncate">{student.name}</p>
                                                                    <p className="text-[9px] md:text-[10px] text-stone-400 tracking-wider truncate">ห้อง {student.room} | ฉายา: {pet.title}</p>
                                                                </div>
                                                            </div>
                                                            <div className="text-right flex items-center gap-2 md:gap-3 shrink-0 ml-2">
                                                                <span className="text-xl md:text-2xl" title={pet.stage}>{pet.emoji}</span>
                                                                <div>
                                                                    <p className="text-amber-500 font-serif font-black text-base md:text-lg">{student.totalScore}</p>
                                                                    <p className="text-[7px] md:text-[8px] text-stone-500 uppercase tracking-widest">EXP PTS</p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                                {globalLeaderboard.length === 0 && <p className="text-stone-500 italic text-center py-6">ยังไม่มีข้อมูลคะแนนลงทะเบียนระบบ</p>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* เข้าสู่ระบบของนักเรียน */}
                            {view === 'studentLogin' && (
                                <div className="flex flex-col items-center justify-center h-full p-4 relative z-10 text-white">
                                    <button onClick={() => setView('home')} className="mb-6 opacity-60 hover:opacity-100 flex items-center gap-2 uppercase tracking-widest text-sm font-bold text-white transition">&larr; Back to Home</button>
                                    <div className="glass-panel p-6 md:p-8 w-full max-w-md rounded-2xl border-t-4 border-t-amber-500 shadow-2xl">
                                        <div className="text-center mb-8">
                                            <h2 className="text-2xl md:text-3xl font-serif font-bold text-white tracking-widest uppercase mb-2">Explorer ID</h2>
                                            <p className="opacity-75 text-sm font-semibold">ระบุรหัสประจำตัวนักเรียน 5 หลัก เพื่อดูรายงานส่งงาน</p>
                                        </div>
                                        <form onSubmit={handleStudentLogin} className="space-y-6">
                                            <input 
                                                type="text" placeholder="รหัสประจำตัว (เช่น 65001)"
                                                value={studentId} onChange={(e) => setStudentId(e.target.value)}
                                                className="w-full text-center text-xl md:text-2xl font-serif p-4 input-theme rounded-xl focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 outline-none transition-all placeholder-stone-400"
                                                required
                                            />
                                            <button type="submit" disabled={loading} className="w-full bg-amber-500 hover:bg-amber-400 text-black font-black uppercase tracking-widest py-4 rounded-xl transition-all shadow-md">
                                                {loading ? 'Searching...' : 'Access Records'}
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {/* เข้าสู่ระบบสำหรับแอดมิน */}
                            {view === 'adminLogin' && (
                                <div className="flex flex-col items-center justify-center h-full p-4 relative z-10 text-white">
                                    <button onClick={() => setView('home')} className="mb-6 opacity-60 hover:opacity-100 flex items-center gap-2 uppercase tracking-widest text-sm font-bold text-white transition">&larr; Back to Home</button>
                                    <div className="glass-panel p-6 md:p-8 w-full max-w-md rounded-2xl border-t-4 border-t-amber-500 shadow-2xl">
                                        <h2 className="text-xl md:text-2xl font-serif font-bold text-center mb-6 text-white uppercase tracking-widest">HQ Portal</h2>
                                        <form onSubmit={(e) => { 
                                            e.preventDefault(); 
                                            if(adminPassword==='gongcodesmart'){
                                                setView('adminPortal'); 
                                                setAdminPassword('');
                                            } else {
                                                setModal({isOpen:true, type:'alert', data:'สิทธิ์การเข้าถึงถูกระงับ: รหัสผ่านระบบไม่ถูกต้อง'});
                                            } 
                                        }} className="space-y-6">
                                            <input type="password" placeholder="รหัสผ่านระบบแอดมิน" value={adminPassword} onChange={e=>setAdminPassword(e.target.value)} className="w-full p-4 input-theme rounded-xl text-center text-xl focus:ring-2 ring-amber-500 outline-none placeholder-stone-400" required/>
                                            <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl uppercase tracking-widest shadow-md">Grant Access</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {view === 'studentPortal' && currentStudent && renderStudentPortal()}
                            {view === 'adminPortal' && renderAdminDashboard()}
                        </>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
